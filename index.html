<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Question Answering</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:90%;
    max-width:700px;
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    margin-top:0;
}

textarea{
    width:100%;
    height:120px;
    padding:12px;
    border:none;
    border-radius:10px;
    resize:none;
    font-size:16px;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#answer{
    margin-top:20px;
    padding:15px;
    background:#334155;
    border-radius:10px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">
    <h1>Ask Anything 🤖</h1>

    <textarea id="question" placeholder="Type your question..."></textarea>

    <button onclick="askQuestion()">Get Answer</button>

    <div id="answer">Answer will appear here...</div>
</div>

<script>
async function askQuestion() {
    const question = document.getElementById("question").value;
    const answerBox = document.getElementById("answer");

    answerBox.innerHTML = "Thinking... humans ask so much.";

    const response = await fetch("/api/rag", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            query: question
        })
    });

    const data = await response.json();

    answerBox.innerHTML = data.answer || JSON.stringify(data);
}
</script>

</body>
</html>
