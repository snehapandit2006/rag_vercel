<!DOCTYPE html>
<html>
<head>
<title>Advanced RAG</title>
<style>
body{
font-family:Arial;
background:#111827;
color:white;
padding:40px;
}
input,textarea,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
}
button{
background:#22c55e;
font-weight:bold;
}
#result{
margin-top:20px;
padding:15px;
background:#1f2937;
}
</style>
</head>

<body>

<h1>📚 Multi File RAG System</h1>

<form id="uploadForm">
<input type="file" id="files" multiple>
<button type="submit">Upload Files</button>
</form>

<textarea id="query" placeholder="Ask question..."></textarea>
<button onclick="ask()">Get Answer</button>

<div id="result"></div>

<script>
document.getElementById("uploadForm").onsubmit = async(e)=>{
e.preventDefault();

let data = new FormData();
let files = document.getElementById("files").files;

for(let f of files){
data.append("files",f);
}

let res = await fetch("/upload",{method:"POST",body:data});
let out = await res.json();

alert(out.message || "Upload failed");
}

async function ask(){

let query = document.getElementById("query").value;

let res = await fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query})
});

let out = await res.json();

document.getElementById("result").innerHTML =
"<b>Answer:</b><br>"+out.answer+
"<br><br><b>Sources:</b><br>"+JSON.stringify(out.sources,null,2);
}
</script>

</body>
</html>
